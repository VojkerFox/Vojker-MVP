name: Vojker MVP CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: windows-latest  # Pidetään Windows-ympäristö samana kuin livenä

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jax jaxlib pytest pytest-asyncio anyio MetaTrader5 pandas

      - name: Run Tests with Verified Path
        env:
          PYTHONPATH: .  # Opettaa pilvelle, mistä 'core' ja 'adapters' löytyvät
        run: |
          pytest tests/ --maxfail=1 -v