name: Vojker MVP CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: windows-latest # Koska käytät Windowsia livenä, pidetään CI samana

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Koska requirements.txt saattaa olla tyhjä, asennetaan kriittiset suoraan
          pip install jax jaxlib pytest pytest-asyncio anyio

      - name: Run Tests with Verified Path
        env:
          PYTHONPATH: . # Tämä opettaa GitHub Actionsille mistä 'core' löytyy!
        run: |
          pytest tests/ --maxfail=1 -v
