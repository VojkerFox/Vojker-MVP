name: Vojker MVP CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout koodi
        uses: actions/checkout@v4

      - name: Alusta Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Asenna riippuvuudet
        run: |
          python -m pip install --upgrade pip
          # Asennetaan vain välttämättömät (JAX CPU-moodissa)
          pip install pytest numpy MetaTrader5 jax[cpu]

      - name: Aja MVP Testit
        env:
          JAX_ENABLE_X64: "True"
          JAX_PLATFORM_NAME: "cpu"
        run: |
          # Aja testit ja pysäytä heti jos yksikin failaa
          pytest tests/ --maxfail=1 -v
